<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisiTrack - Visitor Registration</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #ffffff;
      color: #1e293b;
    }

.sidebar {
  background: #0f172a;
  color: #fff;
  min-height: 100vh;
  padding: 24px 18px;
  position: sticky;
  top: 0;
}

.brand {
  font-size: 1.45rem;
  font-weight: 700;
  letter-spacing: .2px;
  margin-bottom: 34px;
}

.brand i {
  color: #60a5fa;
}


.nav-link {
  color: #cbd5e1;
  font-size: 15px;
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.25s ease;
}

.nav-link:hover,
.nav-link.active {
  background-color: #2563eb;
  color: #ffffff;
}

.content {
  background: #fff;
  min-height: 100vh;
  padding: 28px;
}

    .page-header {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 22px 26px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
      margin-bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
    }

    .page-header p {
      color: #64748b;
      margin: 6px 0 0;
    }

    .header-icon {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      background-color: #dbeafe;
      color: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .form-card {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 34px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
      max-width: 1100px;
    }

    .form-section-title {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e2e8f0;
    }

    .form-label {
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    .form-control,
    .form-select {
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      background-color: #ffffff;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.16);
    }

    .input-group-text {
      background-color: #eff6ff;
      border: 1px solid #cbd5e1;
      color: #2563eb;
      border-radius: 10px 0 0 10px;
    }

    .input-group .form-control,
    .input-group .form-select {
      border-radius: 0 10px 10px 0;
    }

    .file-help {
      color: #64748b;
      font-size: 13px;
      margin-top: 6px;
    }

    .submit-btn {
      background-color: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 13px 30px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .submit-btn:hover {
      background-color: #1d4ed8;
      color: #ffffff;
    }

    .reset-btn {
      border: 1px solid #cbd5e1;
      color: #334155;
      background-color: #ffffff;
      border-radius: 10px;
      padding: 13px 24px;
      font-weight: 600;
    }

    .reset-btn:hover {
      background-color: #f8fafc;
      color: #0f172a;
    }

    @media (max-width: 992px) {
      .sidebar {
        position: relative;
        width: 100%;
        min-height: auto;
      }

      .main-content {
        margin-left: 0;
        padding: 24px;
      }

      .page-header {
        align-items: flex-start;
        gap: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container-fluid">
  <div class="row layout">
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

  <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        Visitor Registered Successfully!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>

</div>

  <!-- Sidebar -->
 <aside class="col-lg-3 col-xl-2 sidebar">
    <div class="brand d-flex align-items-center gap-2">
        <i class="bi bi-shield-check"></i>
        <span>VisiTrack</span>
    </div>

    <nav class="nav flex-column">
        <a class="nav-link" href="/dashboard">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>

        <a class="nav-link active" href="/register">
            <i class="bi bi-person-plus me-2"></i>Visitor Registration
        </a>

        <a class="nav-link" href="/checkinout"><i class="bi bi-box-arrow-in-right me-2"></i>Check-In /Check-out</a>

        

        <a class="nav-link" href="/report">
            <i class="bi bi-bar-chart me-2"></i>Reports
        </a>

        <a class="nav-link" href="/qrpass">
            <i class="bi bi-qr-code me-2"></i>QR Passes
        </a>

        <a class="nav-link" href="/logout">
            <i class="bi bi-box-arrow-left me-2"></i>Logout
        </a>
    </nav>
</aside>

  <!-- Main Content -->
 <main class="col-lg-9 col-xl-10 content">

    <!-- Page Header -->
    <header class="page-header">
      <div>
        <h1>Visitor Registration</h1>
        <p>Register new visitors and capture required visit information.</p>
      </div>

      <div class="header-icon">
        <i class="bi bi-person-plus"></i>
      </div>
    </header>

    <!-- Visitor Registration Form -->
    <section class="form-card">
      <h2 class="form-section-title">Visitor Details</h2>

      <form id="visitorForm"
      enctype="multipart/form-data"
      onsubmit="validateForm(event)">
        <div class="row g-4">

          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-person"></i>
              </span>
              <input
    type="text"
    id="name"
    name="name"
    class="form-control"
    placeholder="Enter your name">
              
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Mobile Number</label>
          
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-telephone"></i>
              </span>
              <input
    type="text"
    id="mobile"
    name="mobile"
    class="form-control"
    placeholder="Enter mobile number"
  >
        
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>
              <input
    type="email"
    id="email"
    name="email"
    class="form-control"
    placeholder="Enter email address"
  >
              
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Company Name</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-building"></i>
              </span>
              <input
    type="text"
    id="company"
    name="company"
    class="form-control"
    placeholder="Enter company name"
  >
            
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Purpose of Visit</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-clipboard-check"></i>
              </span>
               <select id="purpose" name="purpose" class="form-select">
                <option selected disabled>Select purpose</option>
                <option>Business Meeting</option>
                <option>Interview</option>
                <option>Delivery</option>
                <option>Maintenance</option>
                <option>Client Visit</option>
                <option>Other</option>
              </select>
            </div>
            <div id="otherPurposeDiv" style="display:none; margin-top:10px;">
                <label class="form-label">Specify Purpose</label>
                <input
                type="text"
                id="otherPurpose"
                class="form-control"
                placeholder="Enter purpose"
                />
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Employee to Meet</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-person-badge"></i>
              </span>
              <input
                type="text"
                class="form-control"
                placeholder="Enter employee name"
              />
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Visit Date</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-calendar-event"></i>
              </span>
              <input
                type="date"
                class="form-control"
              />
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Upload Photo</label>
            <input
              type="file"
              name="photo"
              class="form-control"
              accept="image/*"
            />
            <div class="file-help">Upload a clear visitor photo.</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Upload ID Proof</label>
            <input
              type="file"
              name="id_proof"
              class="form-control"
              accept=".pdf,image/*"
            />
            <div class="file-help">Accepted formats: PDF, JPG, PNG.</div>
          </div>

        </div>

        <div class="d-flex justify-content-end gap-3 mt-5">
          <button type="reset" class="btn reset-btn">
            Clear Form
          </button>

          <button type="submit" class="btn submit-btn">
            Submit Registration
          </button>
        </div>
      </form>
    </section>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>

function toggleOtherPurpose() {
  let purpose = document.getElementById("purpose").value;
  let otherDiv = document.getElementById("otherPurposeDiv");

  if (purpose === "Other") {
    otherDiv.style.display = "block";
  } else {
    otherDiv.style.display = "none";
  }
}

function showSuccessToast(message) {
  const toastEl = document.getElementById("successToast");
  toastEl.querySelector(".toast-body").innerText = message;

  const toast = new bootstrap.Toast(toastEl);
  toast.show();
}
async function logout() {
    const response = await fetch('/logout');
    window.location.href = "/";
}
async function validateForm(event) {
  event.preventDefault(); // stop page reload

  let name = document.getElementById("name").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let email = document.getElementById("email").value.trim();

  if (name === "") {
    alert("Please enter Full Name");
    return;
  }

  if (mobile.length !== 10 || isNaN(mobile)) {
    alert("Enter valid 10-digit Mobile Number");
    return;
  }

  let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailPattern.test(email)) {
    alert("Enter valid Email Address");
    return;
  }

  try {
    const form = document.getElementById("visitorForm");
    const formData = new FormData(form);
    for (let pair of formData.entries()) {
      console.log(pair[0], pair[1]);
}

     const response = await fetch("/register-visitor", {
      method: "POST",
      body: formData
    });


    console.log("STATUS:", response.status);

    const result = await response.json();
    console.log("RESULT:", result);

    showSuccessToast(result.message || "Visitor Registered Successfully!");

    form.reset();

  } catch (error) {
    console.error(error);
    alert("Something went wrong!");
  }
}

</script>
</div>
</div>

</body>
</html>
