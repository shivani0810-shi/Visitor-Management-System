<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisiTrack - Login</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #ffffff;
      color: #1e293b;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      background-color: #ffffff;
    }

    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    .illustration-card {
      width: 100%;
      max-width: 720px;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
    }

    .scene {
      width: 100%;
      min-height: 520px;
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      border: 1px solid #dbeafe;
    }

    .office-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(#dbeafe 1px, transparent 1px),
        linear-gradient(90deg, #dbeafe 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.45;
    }

    .building {
      position: absolute;
      top: 40px;
      right: 38px;
      width: 170px;
      height: 210px;
      background-color: #dbeafe;
      border-radius: 12px 12px 0 0;
      border: 2px solid #bfdbfe;
    }

    .building::before {
      content: "";
      position: absolute;
      inset: 22px;
      background:
        linear-gradient(90deg, #2563eb 14px, transparent 14px) 0 0 / 36px 34px,
        linear-gradient(#2563eb 12px, transparent 12px) 0 0 / 36px 34px;
      opacity: 0.28;
    }

    .reception-desk {
      position: absolute;
      left: 80px;
      bottom: 70px;
      width: 440px;
      height: 120px;
      background-color: #0f172a;
      border-radius: 12px;
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.22);
    }

    .reception-desk::before {
      content: "RECEPTION";
      position: absolute;
      left: 24px;
      top: 22px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .desk-panel {
      position: absolute;
      right: 24px;
      top: 24px;
      width: 150px;
      height: 70px;
      border-radius: 10px;
      background-color: #1e293b;
      border: 1px solid #334155;
    }

    .receptionist {
      position: absolute;
      left: 130px;
      bottom: 178px;
      width: 110px;
      height: 150px;
    }

    .receptionist .head,
    .visitor .head,
    .security .head {
      width: 48px;
      height: 48px;
      background-color: #f8c9a7;
      border-radius: 50%;
      margin: 0 auto;
      border: 3px solid #ffffff;
    }

    .receptionist .body {
      width: 86px;
      height: 92px;
      background-color: #2563eb;
      border-radius: 18px 18px 8px 8px;
      margin: -2px auto 0;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
    }

    .visitor {
      position: absolute;
      left: 350px;
      bottom: 180px;
      width: 118px;
      height: 160px;
    }

    .visitor .body {
      width: 88px;
      height: 98px;
      background-color: #60a5fa;
      border-radius: 18px 18px 8px 8px;
      margin: -2px auto 0;
    }

    .tablet {
      position: absolute;
      left: 286px;
      bottom: 220px;
      width: 96px;
      height: 128px;
      background-color: #ffffff;
      border: 7px solid #0f172a;
      border-radius: 12px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
    }

    .tablet::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 22px;
      width: 54px;
      height: 8px;
      background-color: #bfdbfe;
      border-radius: 8px;
      box-shadow: 0 20px 0 #bfdbfe, 0 40px 0 #bfdbfe;
    }

    .tablet::after {
      content: "Register";
      position: absolute;
      left: 13px;
      bottom: 16px;
      background-color: #2563eb;
      color: #ffffff;
      padding: 5px 10px;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 700;
    }

    .qr-scanner {
      position: absolute;
      right: 88px;
      bottom: 118px;
      width: 120px;
      height: 150px;
      background-color: #ffffff;
      border: 2px solid #bfdbfe;
      border-radius: 12px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.14);
      padding: 16px;
      text-align: center;
    }

    .qr-code {
      width: 76px;
      height: 76px;
      margin: 0 auto 12px;
      background:
        linear-gradient(90deg, #0f172a 10px, transparent 10px) 0 0 / 19px 19px,
        linear-gradient(#0f172a 10px, transparent 10px) 0 0 / 19px 19px,
        #ffffff;
      border: 6px solid #eff6ff;
      border-radius: 8px;
    }

    .scanner-line {
      width: 80px;
      height: 4px;
      background-color: #2563eb;
      border-radius: 20px;
      margin: 0 auto 10px;
      box-shadow: 0 0 14px rgba(37, 99, 235, 0.7);
    }

    .qr-scanner span {
      color: #0f172a;
      font-size: 12px;
      font-weight: 700;
    }

    .visitor-pass {
      position: absolute;
      left: 445px;
      bottom: 265px;
      width: 92px;
      height: 118px;
      background-color: #ffffff;
      border: 2px solid #bfdbfe;
      border-radius: 12px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.14);
      padding: 12px;
    }

    .visitor-pass::before {
      content: "";
      display: block;
      width: 34px;
      height: 34px;
      background-color: #dbeafe;
      border-radius: 50%;
      margin: 0 auto 10px;
    }

    .visitor-pass::after {
      content: "VISITOR PASS";
      display: block;
      color: #2563eb;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
      border-top: 2px solid #dbeafe;
      padding-top: 10px;
    }

    .approval-card {
      position: absolute;
      left: 72px;
      top: 78px;
      width: 210px;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 18px;
      border: 1px solid #dbeafe;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }

    .approval-card h6 {
      color: #0f172a;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .approval-line {
      height: 8px;
      background-color: #dbeafe;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .approved-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: #dcfce7;
      color: #166534;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-top: 8px;
    }

    .security {
      position: absolute;
      right: 252px;
      bottom: 170px;
      width: 100px;
      height: 145px;
    }

    .security .body {
      width: 82px;
      height: 88px;
      background-color: #0f172a;
      border-radius: 18px 18px 8px 8px;
      margin: -2px auto 0;
    }

    .access-shield {
      position: absolute;
      right: 240px;
      top: 116px;
      width: 78px;
      height: 92px;
      background-color: #2563eb;
      clip-path: polygon(50% 0%, 90% 15%, 82% 72%, 50% 100%, 18% 72%, 10% 15%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 26px;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.24);
    }

    .scene-label {
      position: absolute;
      left: 32px;
      bottom: 24px;
      color: #475569;
      font-size: 14px;
      font-weight: 700;
    }

    .right-panel {
      width: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background-color: #ffffff;
    }

    .login-card {
      width: 100%;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 42px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    .logo {
      font-size: 30px;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
      margin-bottom: 28px;
    }

    .logo span {
      color: #2563eb;
    }

    .login-card h1 {
      font-size: 30px;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-card .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 30px;
    }

    .form-label {
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    .form-control,
    .form-select {
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      color: #1e293b;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.16);
    }

    .input-group-text {
      background-color: #eff6ff;
      color: #2563eb;
      border: 1px solid #cbd5e1;
      border-radius: 10px 0 0 10px;
    }

    .input-group .form-control {
      border-radius: 0 10px 10px 0;
    }

    .form-check-input:checked {
      background-color: #2563eb;
      border-color: #2563eb;
    }

    .forgot-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .forgot-link:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      background-color: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-weight: 700;
      margin-top: 18px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .login-btn:hover {
      background-color: #1d4ed8;
      color: #ffffff;
    }

    @media (max-width: 1100px) {
      .login-page {
        flex-direction: column;
      }

      .right-panel {
        width: 100%;
      }

      .left-panel {
        min-height: 560px;
      }
    }

    @media (max-width: 768px) {
      .left-panel {
        padding: 24px;
      }

      .illustration-card {
        padding: 18px;
      }

      .scene {
        min-height: 430px;
      }

      .right-panel {
        padding: 28px 20px;
      }

      .login-card {
        padding: 30px 24px;
      }
    }
  </style>
</head>

<body>

  <div class="login-page">

    <!-- Left Illustration Panel -->
    <section class="left-panel">
      <div class="illustration-card">
        <div class="scene">
          <div class="office-bg"></div>

          <div class="building"></div>

          <div class="approval-card">
            <h6>Employee Approval</h6>
            <div class="approval-line"></div>
            <div class="approval-line" style="width: 72%;"></div>
            <div class="approval-line" style="width: 86%;"></div>
            <div class="approved-badge">
              <i class="bi bi-check-circle-fill"></i>
              Approved
            </div>
          </div>

          <div class="access-shield">
            <i class="bi bi-shield-lock-fill"></i>
          </div>

          <div class="receptionist">
            <div class="head"></div>
            <div class="body"></div>
          </div>

          <div class="tablet"></div>

          <div class="visitor">
            <div class="head"></div>
            <div class="body"></div>
          </div>

          <div class="visitor-pass"></div>

          <div class="security">
            <div class="head"></div>
            <div class="body"></div>
          </div>

          <div class="qr-scanner">
            <div class="qr-code"></div>
            <div class="scanner-line"></div>
            <span>QR Scan</span>
          </div>

          <div class="reception-desk">
            <div class="desk-panel"></div>
          </div>

          <div class="scene-label">
            Visitor Registration • QR Pass • Tracking • Access Control
          </div>
        </div>
      </div>
    </section>

    <!-- Right Login Panel -->
    <section class="right-panel">
      <div class="login-card">
        <div class="logo">
          Visi<span>Track</span>
        </div>

        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to access your visitor management dashboard</p>
        <form onsubmit="validateLogin(event); return false;">
            <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>
              <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter your email address"
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>
              <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Enter your password"
              />
            </div>
          </div>

        

          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="rememberMe"
              />
              <label class="form-check-label" for="rememberMe">
                Remember Me
              </label>
            </div>

            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="btn login-btn">
            Login
          </button>
        </form>
      </div>
    </section>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  async function validateLogin(event) {
    event.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

    const data = await response.json();

    if (response.ok) {

        if (data.role === "Admin") {
            window.location.href = "/admin";
        } else if (data.role === "Reception") {
            window.location.href = "/reception";
        } else {
            window.location.href = "/employee";
        }

    } else {
        alert(data.message || "Login Failed");
    }
}
</script>
</body>
</html>
